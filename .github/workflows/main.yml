name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

      - name: Create .mcaddon file
        run: |
          for dir in addons/minecraft-bedrock-addon/development_behavior_packs/* addons/minecraft-bedrock-addon/development_resource_packs/*; do
            if [ -d "$dir" ]; then
              pack_dir=$(basename "$dir")
              parent_dir=$(dirname "$dir")
              (cd "$parent_dir" && zip -r ../../../minecraft-addon.mcaddon "$pack_dir")
            fi
          done
          
      - name: Upload .mcaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-addon
          path: minecraft-addon.mcaddon        

      - name: Verify local deployment and seeding
        run: |
          npx hardhat node > hardhat.log 2>&1 &
          # Wait for the node to start (up to 30 seconds)
          for i in {1..30}; do
            if grep -q "Started HTTP and WebSocket JSON-RPC server" hardhat.log; then
              echo "Hardhat node is ready!"
              break
            fi
            echo "Waiting for Hardhat node... ($i)"
            sleep 1
          done
          npx cross-env HARDHAT_IGNITION_CONFIRM_DEPLOYMENT=true npx hardhat ignition deploy ignition/modules/App.ts --network localhost
          npm run seed:local

      - name: Deploy to Sepolia (Gasless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          TREASURY_ADDRESS: ${{ secrets.TREASURY_ADDRESS }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_GAS_POLICY_ID: ${{ secrets.ALCHEMY_GAS_POLICY_ID }}
        run: npm run deploy:sepolia:gasless

      - name: Seed Data on Sepolia (Gasless)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          SEPOLIA_BUYER_PRIVATE_KEY: ${{ secrets.SEPOLIA_BUYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_GAS_POLICY_ID: ${{ secrets.ALCHEMY_GAS_POLICY_ID }}
        run: npm run seed:sepolia

      - name: Build frontend
        run: npm run build:frontend

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/frontend

      - name: Upload Deployment Artifacts
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-deployment
          path: ignition/deployments/
