name: Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Cache Hardhat compiler
        uses: actions/cache@v4
        with:
          path: ~/.cache/hardhat-nodejs
          key: ${{ runner.os }}-hardhat-compiler-${{ hashFiles('hardhat.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-hardhat-compiler-

      - name: Pre-seed Hardhat compiler cache
        run: |
          mkdir -p ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64
          if [ ! -f ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64/solc-linux-amd64-v0.8.28+commit.7893614a ]; then
            echo "Downloading solc 0.8.28 from GitHub mirror..."
            curl -L https://raw.githubusercontent.com/ethereum/solc-bin/gh-pages/linux-amd64/solc-linux-amd64-v0.8.28+commit.7893614a -o ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64/solc-linux-amd64-v0.8.28+commit.7893614a
            chmod +x ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64/solc-linux-amd64-v0.8.28+commit.7893614a
          fi
          if [ ! -f ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64/list.json ]; then
            echo "Downloading compiler list from GitHub mirror..."
            curl -L https://raw.githubusercontent.com/ethereum/solc-bin/gh-pages/linux-amd64/list.json -o ~/.cache/hardhat-nodejs/compilers-v3/linux-amd64/list.json
          fi

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npx hardhat compile

      - name: Run tests
        run: npx hardhat test

      - name: Create .mcaddon file
        run: |
          for dir in addons/minecraft-bedrock-addon/development_behavior_packs/* addons/minecraft-bedrock-addon/development_resource_packs/*; do
            if [ -d "$dir" ]; then
              pack_dir=$(basename "$dir")
              parent_dir=$(dirname "$dir")
              (cd "$parent_dir" && zip -r ../../../minecraft-addon.mcaddon "$pack_dir")
            fi
          done
          
      - name: Upload .mcaddon artifact
        uses: actions/upload-artifact@v4
        with:
          name: minecraft-addon
          path: minecraft-addon.mcaddon        

      - name: Verify local deployment and seeding
        run: |
          npx hardhat node > hardhat.log 2>&1 &
          # Wait for the node to start (up to 30 seconds)
          for i in {1..30}; do
            if grep -q "Started HTTP and WebSocket JSON-RPC server" hardhat.log; then
              echo "Hardhat node is ready!"
              break
            fi
            echo "Waiting for Hardhat node... ($i)"
            sleep 1
          done
          npx cross-env HARDHAT_IGNITION_CONFIRM_DEPLOYMENT=true npx hardhat ignition deploy ignition/modules/App.ts --network localhost
          npm run seed:local

      - name: Export ABIs
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: node scripts/export-abis.cjs

      - name: Build frontend
        run: npm run build:frontend

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/frontend
