name: Seed Data

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Seed Data on Sepolia (Gasless)
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          SEPOLIA_PRIVATE_KEY: ${{ secrets.SEPOLIA_PRIVATE_KEY }}
          SEPOLIA_BUYER_PRIVATE_KEY: ${{ secrets.SEPOLIA_BUYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
          ALCHEMY_GAS_POLICY_ID: ${{ secrets.ALCHEMY_GAS_POLICY_ID }}
        run: npm run seed:sepolia

      - name: Upload Deployment Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sepolia-deployment
          path: ignition/deployments/
