<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manager | brag.charity Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-card {
            border-left: 4px solid #6366f1;
        }
        .section-header {
            font-size: 0.75rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #64748b;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
        }
        .section-header i { margin-right: 0.75rem; color: #818cf8; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <div id="header-include"></div>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full space-y-12">
        <header class="space-y-2">
            <h1 class="text-4xl font-black tracking-tight">Manager</h1>
            <p class="text-slate-500 text-sm font-medium">Administrator tools for contract management and environment control.</p>
        </header>

        <!-- Env & Contracts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Env Control -->
            <section class="glass-card rounded-3xl p-8 admin-card lg:col-span-2">
                <div class="section-header"><i class="fas fa-microchip"></i> Environment Control</div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="envServiceStatus">
                    <!-- Service cards -->
                </div>
                <div class="mt-8 pt-8 border-t border-white/5 space-y-4">
                    <div class="flex items-center justify-between">
                        <h3 class="text-xs font-black uppercase text-slate-400">Minecraft Node</h3>
                        <div id="mcStatus" class="text-[10px] font-bold text-red-500">OFFLINE</div>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button id="btnMcStart" class="btn-secondary px-4 py-2 rounded-xl text-[10px] font-black uppercase">Start</button>
                        <button id="btnMcStop" class="btn-secondary px-4 py-2 rounded-xl text-[10px] font-black uppercase">Stop</button>
                        <button id="btnInjectAddon" class="btn-primary px-4 py-2 rounded-xl text-[10px] font-black uppercase">Inject Addon</button>
                    </div>
                </div>
            </section>

            <!-- Contract Setup -->
            <section class="glass-card rounded-3xl p-8 admin-card">
                <div class="section-header"><i class="fas fa-settings"></i> Setup</div>
                <div class="space-y-6">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">BragNFT</label>
                        <input type="text" id="addrBragNFT" class="input-field w-full px-4 py-3 rounded-xl text-xs font-mono" placeholder="0x...">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">Marketplace</label>
                        <input type="text" id="addrNFTMarketplace" class="input-field w-full px-4 py-3 rounded-xl text-xs font-mono" placeholder="0x...">
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase mb-2">ExhibitRegistry</label>
                        <input type="text" id="addrExhibitRegistry" class="input-field w-full px-4 py-3 rounded-xl text-xs font-mono" placeholder="0x...">
                    </div>
                    <button id="btnAutofill" class="w-full btn-secondary py-3 rounded-xl text-[10px] font-black uppercase">Sync with Deployments</button>
                </div>
            </section>
        </div>

        <!-- Operations Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <!-- Minting Operatons -->
            <section class="glass-card rounded-3xl p-8 admin-card">
                <div class="section-header"><i class="fas fa-plus"></i> Minting Operations</div>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-4">
                        <input type="number" id="mintAmount" class="input-field px-4 py-3 rounded-xl text-sm" value="0.01" step="0.001">
                        <input type="text" id="mintMessage" class="input-field px-4 py-3 rounded-xl text-sm" placeholder="Message">
                    </div>
                    <div class="relative">
                        <input type="text" id="mintTokenURI" class="input-field w-full px-4 py-3 rounded-xl text-sm pr-24" placeholder="Media URI">
                        <div class="absolute right-2 top-1/2 -translate-y-1/2 flex space-x-1">
                            <button id="btnGenerateAI" class="w-8 h-8 rounded-lg bg-indigo-500/20 text-indigo-400 hover:bg-indigo-500 hover:text-white transition-colors"><i class="fas fa-robot text-xs"></i></button>
                            <button id="btnUpload" class="w-8 h-8 rounded-lg bg-white/5 text-slate-400 hover:bg-white/10 hover:text-white transition-colors"><i class="fas fa-upload text-xs"></i></button>
                        </div>
                    </div>
                    <div id="aiPreview" class="hidden rounded-2xl overflow-hidden border border-white/5">
                        <img id="aiPreviewImg" class="w-full h-32 object-cover">
                    </div>
                    <label class="flex items-center space-x-3 cursor-pointer group">
                        <input type="checkbox" id="mintOnChain" class="rounded border-white/10 bg-slate-900 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-[10px] font-bold text-slate-500 group-hover:text-slate-300 uppercase tracking-widest">Store media on-chain</span>
                    </label>
                    <button id="btnMint" class="w-full btn-primary py-4 rounded-2xl font-black uppercase text-xs tracking-widest">Donate & Mint</button>
                </div>
            </section>

            <!-- Vault/Exhibition Ops -->
            <section class="glass-card rounded-3xl p-8 admin-card">
                <div class="section-header"><i class="fas fa-vault"></i> Exhibition Ops</div>
                <div class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-3">
                            <h4 class="text-[10px] font-black text-slate-600 uppercase">Deployment</h4>
                            <button id="btnDeployVault" class="w-full btn-secondary py-3 rounded-xl text-[10px] font-black uppercase">Deploy New Vault</button>
                        </div>
                        <div class="space-y-3">
                            <h4 class="text-[10px] font-black text-slate-600 uppercase">Registration</h4>
                            <input type="text" id="regVaultAddr" class="input-field w-full px-3 py-2 rounded-lg text-xs" placeholder="Vault Address">
                            <button id="btnRegisterVault" class="w-full btn-primary py-3 rounded-xl text-[10px] font-black uppercase">Register Vault</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Activity Logs -->
        <section class="glass-card rounded-3xl p-8 admin-card">
            <div class="section-header"><i class="fas fa-terminal"></i> Activity Log</div>
            <div id="logs" class="bg-slate-950 rounded-2xl p-6 h-64 overflow-y-auto font-mono text-[10px] text-emerald-500 leading-relaxed border border-white/5 shadow-inner">
                <div>> System ready. Awaiting admin connection...</div>
            </div>
        </section>
    </main>

    <div id="footer-include"></div>

    <script src="contracts.js"></script>
    <script src="core.js"></script>
    <script src="app.js"></script>
    <script src="env-control.js"></script>
</body>
</html>
