<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 flex-grow w-full">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-8 mb-12">
        <div class="space-y-2">
            <h1 class="text-4xl font-black tracking-tight">Marketplace</h1>
            <p class="text-slate-500 text-sm">Discover and collect proof-of-impact NFTs from the community.</p>
        </div>

        <div class="flex flex-wrap items-center gap-4">
            <div class="flex bg-slate-900 rounded-xl p-1 border border-white/5">
                <button class="px-4 py-2 text-xs font-black uppercase tracking-widest rounded-lg bg-white/5 text-white">All</button>
                <button class="px-4 py-2 text-xs font-black uppercase tracking-widest rounded-lg text-slate-500 hover:text-slate-300">Featured</button>
                <button class="px-4 py-2 text-xs font-black uppercase tracking-widest rounded-lg text-slate-500 hover:text-slate-300">Verified</button>
            </div>
            <select id="sortOrder" class="bg-slate-900 border border-white/5 rounded-xl px-4 py-2.5 text-xs font-bold text-slate-400 outline-none focus:border-indigo-500">
                <option value="newest">Recently Minted</option>
                <option value="oldest">Oldest first</option>
            </select>
        </div>
    </div>

    <!-- NFT Grid -->
    <div id="nftGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
        <!-- Loading States -->
        <div class="glass-card rounded-[2rem] overflow-hidden animate-pulse">
            <div class="aspect-square bg-white/5"></div>
            <div class="p-6 space-y-4">
                <div class="h-4 bg-white/5 rounded w-3/4"></div>
                <div class="h-3 bg-white/5 rounded w-1/2"></div>
                <div class="h-10 bg-white/5 rounded-xl w-full"></div>
            </div>
        </div>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-32 space-y-6">
        <div class="w-20 h-20 bg-slate-900 rounded-full flex items-center justify-center mx-auto border border-white/5">
            <i class="fas fa-search text-3xl text-slate-700"></i>
        </div>
        <div class="space-y-2">
            <h3 class="text-xl font-bold">No items found</h3>
            <p class="text-slate-500 text-sm">Be the first to donate and mint a BragNFT!</p>
        </div>
        <button onclick="router.navigateTo('home', '#donate')" class="btn-primary px-8 py-3 rounded-2xl font-black uppercase tracking-widest text-xs">Mint Now</button>
    </div>
</div>
