<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | brag.charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</head>
<body class="min-h-screen flex flex-col justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center items-center space-x-3 mb-8 cursor-pointer" onclick="window.location.href='index.html'">
            <model-viewer src="https://cdn.digitaleducationsafety.org/assets/models/coin.glb" autoplay auto-rotate interaction-prompt="none" class="h-14 w-14 rounded-full border border-white/10 shadow-2xl" style="--poster-color: transparent;"></model-viewer>
            <div>
                <span class="text-4xl font-black bg-clip-text text-transparent brag-gradient">brag</span>
                <span class="text-4xl font-light">.charity</span>
            </div>
        </div>

        <div id="linkingStatus" class="mb-6 hidden">
            <div class="bg-indigo-500/10 border border-indigo-500/30 rounded-2xl p-4 flex items-center space-x-3">
                <div class="animate-pulse bg-indigo-500 h-2 w-2 rounded-full"></div>
                <span class="text-[10px] text-indigo-400 font-black uppercase tracking-widest">Linking Minecraft Account: <span id="displayToken" class="text-white"></span></span>
            </div>
        </div>
    </div>

    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-card py-10 px-6 sm:px-10 rounded-[2.5rem] shadow-2xl">
            <div class="space-y-8">
                <!-- Tabs -->
                <div class="flex border-b border-white/5 mb-8">
                    <button id="tabWallet" class="flex-1 pb-4 text-[10px] font-black uppercase tracking-widest border-b-2 border-indigo-500 text-white">Web3 Wallet</button>
                    <button id="tabEmail" class="flex-1 pb-4 text-[10px] font-black uppercase tracking-widest border-b-2 border-transparent text-slate-500 hover:text-slate-300">Email Auth</button>
                </div>

                <!-- Wallet Login -->
                <div id="walletSection" class="space-y-6">
                    <button id="btnSiwe" class="w-full flex justify-center py-4 px-4 rounded-2xl font-black text-white brag-gradient hover:opacity-90 shadow-xl shadow-indigo-500/20 transition-all uppercase tracking-widest text-xs">
                        <i class="fab fa-ethereum mr-3 text-lg"></i> Sign in with Ethereum
                    </button>

                    <div class="relative py-2">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                        <div class="relative flex justify-center text-[10px]"><span class="px-3 bg-slate-900 text-slate-600 font-black uppercase tracking-widest">Supported</span></div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/5 group hover:border-indigo-500/30 transition-colors">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" alt="MetaMask" class="h-8 w-8 mb-2">
                            <span class="text-[9px] font-black uppercase text-slate-500 group-hover:text-slate-300">MetaMask</span>
                        </div>
                        <div class="flex flex-col items-center justify-center p-4 rounded-2xl bg-white/5 border border-white/5 group hover:border-indigo-500/30 transition-colors">
                            <img src="https://raw.githubusercontent.com/WalletConnect/walletconnect-assets/master/Logo/Blue%20(Default)/Logo.svg" alt="WalletConnect" class="h-8 w-8 mb-2">
                            <span class="text-[9px] font-black uppercase text-slate-500 group-hover:text-slate-300">WalletConnect</span>
                        </div>
                    </div>
                </div>

                <!-- Email Login -->
                <div id="emailSection" class="space-y-8 hidden">
                    <button id="btnGoogle" class="w-full flex justify-center items-center py-4 px-4 rounded-2xl font-black text-white bg-white/5 border border-white/10 hover:bg-white/10 transition-all uppercase tracking-widest text-[10px]">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="h-5 w-5 mr-3">
                        Continue with Google
                    </button>

                    <div class="relative">
                        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
                        <div class="relative flex justify-center text-[10px]"><span class="px-3 bg-slate-900 text-slate-600 font-black uppercase tracking-widest">OR</span></div>
                    </div>

                    <form id="emailForm" class="space-y-5">
                        <div class="space-y-2">
                            <label for="email" class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Email Address</label>
                            <input id="email" type="email" required class="input-field block w-full px-5 py-4 rounded-2xl text-sm font-medium">
                        </div>

                        <div class="space-y-2">
                            <label for="password" class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Password</label>
                            <input id="password" type="password" required class="input-field block w-full px-5 py-4 rounded-2xl text-sm font-medium">
                        </div>

                        <button type="submit" id="btnLoginEmail" class="w-full btn-primary py-4 rounded-2xl font-black text-white uppercase tracking-widest text-xs mt-4">
                            Sign in to Admin
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <p class="mt-8 text-center text-[10px] font-black uppercase tracking-widest text-slate-600">
            &copy; 2026 brag.charity Ecosystem &bull; <a href="#" class="hover:text-indigo-400">Security Policy</a>
        </p>
    </div>

    <script src="login.js"></script>
</body>
</html>
