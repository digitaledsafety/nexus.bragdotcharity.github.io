<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Brag.Charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
        }
        .brag-gradient {
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #6366f1;
            outline: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="flex justify-center items-center space-x-3 mb-6">
            <img src="https://digitaleducationsafety.org/assets/img/logo.jpg" alt="Logo" class="h-12 w-12 rounded-full border border-slate-700">
            <div>
                <span class="text-3xl font-bold bg-clip-text text-transparent brag-gradient">brag</span>
                <span class="text-3xl font-light">.charity</span>
            </div>
        </div>
        <h2 class="text-center text-3xl font-extrabold text-white">Log in to your account</h2>
        <p id="subtext" class="mt-2 text-center text-sm text-slate-400">
            Or
            <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300">
                start your 14-day free trial
            </a>
        </p>
        <div id="linkingStatus" class="mt-4 hidden">
            <div class="bg-indigo-900/30 border border-indigo-500/50 rounded-xl p-4 flex items-center space-x-3">
                <div class="animate-pulse bg-indigo-500 h-2 w-2 rounded-full"></div>
                <span class="text-xs text-indigo-300 font-medium uppercase tracking-wider">Linking Account: <span id="displayToken" class="font-bold"></span></span>
            </div>
        </div>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
        <div class="glass-card py-8 px-4 shadow sm:rounded-3xl sm:px-10">
            <div class="space-y-6">
                <!-- Tabs -->
                <div class="flex border-b border-slate-700 mb-6">
                    <button id="tabWallet" class="flex-1 pb-4 text-sm font-medium border-b-2 border-indigo-500 text-white">Wallet</button>
                    <button id="tabEmail" class="flex-1 pb-4 text-sm font-medium border-b-2 border-transparent text-slate-400 hover:text-slate-300 hover:border-slate-300">Email</button>
                </div>

                <!-- Wallet Login -->
                <div id="walletSection" class="space-y-6">
                    <button id="btnSiwe" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white brag-gradient hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                        <i class="fab fa-ethereum mr-2 mt-0.5"></i> Log in with Ethereum
                    </button>
                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-700"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-slate-900/50 text-slate-500">Popular Wallets</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <button class="flex items-center justify-center py-2 px-4 border border-slate-700 rounded-xl hover:bg-slate-800 transition-colors">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg" alt="MetaMask" class="h-5 w-5 mr-2">
                            <span class="text-xs font-semibold">MetaMask</span>
                        </button>
                        <button class="flex items-center justify-center py-2 px-4 border border-slate-700 rounded-xl hover:bg-slate-800 transition-colors">
                            <img src="https://raw.githubusercontent.com/WalletConnect/walletconnect-assets/master/Logo/Blue%20(Default)/Logo.svg" alt="WalletConnect" class="h-5 w-5 mr-2">
                            <span class="text-xs font-semibold">WalletConnect</span>
                        </button>
                    </div>
                </div>

                <!-- Email Login (Hidden by default) -->
                <div id="emailSection" class="space-y-6 hidden">
                    <button id="btnGoogle" class="w-full flex justify-center items-center py-3 px-4 border border-slate-700 rounded-xl shadow-sm text-sm font-semibold text-white bg-slate-800 hover:bg-slate-700 transition-all">
                        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="h-5 w-5 mr-3">
                        Continue with Google
                    </button>

                    <div class="relative">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-slate-700"></div>
                        </div>
                        <div class="relative flex justify-center text-xs">
                            <span class="px-2 bg-slate-900/50 text-slate-500 uppercase tracking-widest">or</span>
                        </div>
                    </div>

                    <form id="emailForm" class="space-y-6">
                        <div>
                            <label for="email" class="block text-sm font-medium text-slate-400">Email address</label>
                            <div class="mt-1">
                                <input id="email" name="email" type="email" autocomplete="email" required class="input-field block w-full px-4 py-3 rounded-xl sm:text-sm">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-slate-400">Password</label>
                            <div class="mt-1">
                                <input id="password" name="password" type="password" autocomplete="current-password" required class="input-field block w-full px-4 py-3 rounded-xl sm:text-sm">
                            </div>
                        </div>

                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-slate-700 rounded bg-slate-900">
                            <label for="remember-me" class="ml-2 block text-sm text-slate-400">Remember me</label>
                        </div>
                        <div class="text-sm">
                            <a href="#" class="font-medium text-indigo-400 hover:text-indigo-300">Forgot your password?</a>
                        </div>
                    </div>

                        <div>
                            <button type="submit" id="btnLoginEmail" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-white brag-gradient hover:opacity-90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all">
                                Sign in
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <p class="mt-8 text-center text-xs text-slate-500">
            By continuing, you agree to Brag Charity's
            <a href="#" class="underline hover:text-slate-400">Terms of Service</a> and
            <a href="#" class="underline hover:text-slate-400">Privacy Policy</a>.
        </p>
    </div>

    <script src="config.js"></script>
    <script src="login.js"></script>
</body>
</html>
