<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate | STEM Education Mission</title>
    <!-- Dependencies for the Widget -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- The Widget Script -->
    <script src="contracts.js"></script>
    <script src="brag-widget.js"></script>

    <style>
        body {
            background-color: #020617;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 1000px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- The Embeddable Widget -->
        <brag-donation-widget
            campaign-name="Empowering the underserved with modern STEM education"

        </brag-donation-widget>
    </div>

</html>
